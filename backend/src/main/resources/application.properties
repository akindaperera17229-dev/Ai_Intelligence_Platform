spring.application.name=backend

# Enable local profile by default for local development, which loads application-local.properties
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Datasource configuration with environment variable placeholders
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration — schema is now managed by Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------------------------------------------
# Flyway — database migration management
# -------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# -------------------------------------------------------
# Jira Integration
# -------------------------------------------------------
jira.base-url=${JIRA_BASE_URL:}
jira.user-email=${JIRA_USER_EMAIL:}
jira.api-token=${JIRA_API_TOKEN:}

# Sync settings — disabled by default (safe default, enable when Jira is connected)
jira.sync.enabled=${JIRA_SYNC_ENABLED:false}
jira.sync.projects=${JIRA_SYNC_PROJECTS:}
jira.sync.cron=${JIRA_SYNC_CRON:0 0 2 * * *}

# -------------------------------------------------------
# Webhook Security
# -------------------------------------------------------
webhook.secret.github=${GITHUB_WEBHOOK_SECRET:}
webhook.secret.jira=${JIRA_WEBHOOK_SECRET:}

# -------------------------------------------------------
# GitHub OAuth2 Authentication
# -------------------------------------------------------
github.client.id=${GITHUB_CLIENT_ID:}
github.client.secret=${GITHUB_CLIENT_SECRET:}

# -------------------------------------------------------
# JWT Security
# -------------------------------------------------------
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

# -------------------------------------------------------
# Encryption — for storing tenant credentials at rest
# -------------------------------------------------------
encryption.key=${ENCRYPTION_KEY:}

# -------------------------------------------------------
# Application Configuration
# -------------------------------------------------------
app.base-url=${APP_BASE_URL:http://localhost:8080}